<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ed5a2e" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Pickup · CEFR cloze challenge</title>
    <meta name="description" content="Pickup — a cozy after-work English game. CEFR A2 cloze challenges paired with a stray cat's journey home." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet" />
    <!-- v2.0.B.52 perf: parallel-fetch Ch1 critical assets while bundle parses.
         Lesson-page icons added because they appeared as broken [?] when
         iOS Safari rendered the lesson before image fetch completed. -->
    <link rel="preload" as="image" href="/mascots/scene-mochi-talking.webp" />
    <link rel="preload" as="image" href="/mascots/iso-grandma.webp" />
    <link rel="preload" as="image" href="/mascots/iso-shiba.webp" />
    <link rel="preload" as="image" href="/mascots/icon-speaker.webp" />
    <link rel="preload" as="image" href="/mascots/icon-paw.webp" />
    <link rel="preload" as="image" href="/mascots/calico-anchor.webp" />
    <link rel="preload" as="audio" href="/audio/lessons/mochi-ch1-fullnarration.mp3" />
    <style>
      html, body {
        font-family: 'Noto Sans TC', system-ui, -apple-system, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        background: #ed5a2e; /* v1.7.1: bg matches tear-intro so any pre-paint flash stays on-brand */
        margin: 0; padding: 0;
      }

      /* v2.0.B.48 perf: compressed entry transition from 2.8s → 2.0s to
       * stay under 3s first-load LCP budget. Removed the 0.75s mid-hold
       * (recognition not needed for repeat-visit-skip flow), tightened
       * each phase ~10-20%.
       *
       * Timing (total ≈2.0s):
       *   0.05–0.35s: cat face scale 0.7 → 1 (zoom in, fade in)
       *   0.35–0.80s: brief hold
       *   0.80–1.25s: cat scale 1 → 1.5 + opacity 1 → 0 (zoom out)
       *   1.15–1.80s: cream disc expands center → covers viewport
       *   1.80–2.00s: orange shell fades, MenuScene visible underneath
       */
      #pickup-tear-intro {
        position: fixed; inset: 0; z-index: 9999;
        background: #ed5a2e;
        display: flex; align-items: center; justify-content: center;
        pointer-events: none; overflow: hidden;
        animation: pickup-intro-fade 0.2s ease-out 1.80s forwards;
      }
      #pickup-tear-intro .tear-cat {
        width: 24vmin; max-width: 160px; height: auto; display: block;
        opacity: 0;
        transform: scale(0.7);
        animation:
          pickup-cat-zoom-in 0.3s cubic-bezier(0.2, 0.8, 0.3, 1.1) 0.05s forwards,
          pickup-cat-zoom-out 0.45s cubic-bezier(0.4, 0, 0.6, 1) 0.80s forwards;
      }
      #pickup-tear-intro .reveal-disc {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 80px; height: 80px;
        margin-left: -40px; margin-top: -40px;
        border-radius: 50%;
        background: #fef8ed;
        transform: scale(0);
        animation: pickup-disc-expand 0.65s cubic-bezier(0.55, 0, 0.45, 1) 1.15s forwards;
        will-change: transform;
        box-shadow: 0 0 40px rgba(254, 248, 237, 0.6);
      }
      @keyframes pickup-cat-zoom-in {
        from { opacity: 0; transform: scale(0.7); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes pickup-cat-zoom-out {
        from { opacity: 1; transform: scale(1); }
        to   { opacity: 0; transform: scale(1.5); }
      }
      @keyframes pickup-disc-expand {
        0%   { transform: scale(0); }
        100% { transform: scale(50); }
      }
      @keyframes pickup-intro-fade {
        to { opacity: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        #pickup-tear-intro { animation: pickup-intro-fade 0.25s ease-out 0.5s forwards; }
        #pickup-tear-intro img.tear-cat,
        #pickup-tear-intro .reveal-disc { animation: none !important; opacity: 1 !important; transform: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="pickup-tear-intro" aria-hidden="true">
      <img class="tear-cat" src="/mascots/splash-cat.webp" alt="" aria-hidden="true"/>
      <div class="reveal-disc"></div>
    </div>
    <a href="#app" class="skip-link">Skip to main content</a>
    <main id="app"></main>
    <script>
      // v2.0.B.47 perf: skip 2.8s splash on repeat visits (sessionStorage flag).
      // First-time visitor still sees branding splash (which also masks JS
      // bundle parse cost). Returning user lands on app immediately.
      try {
        if (sessionStorage.getItem('pickup.splash.seen') === '1') {
          var el = document.getElementById('pickup-tear-intro');
          if (el) el.remove();
        } else {
          sessionStorage.setItem('pickup.splash.seen', '1');
        }
      } catch (e) {}
      // Boot timing budget instrumentation.
      window.__pickupBootStart = performance.now();
      window.addEventListener('load', function () {
        var ms = Math.round(performance.now() - window.__pickupBootStart);
        var hit = sessionStorage.getItem('pickup.perf.warned') === '1';
        var budget = sessionStorage.getItem('pickup.splash.seen.cached') === '1' ? 1000 : 3000;
        console.log('[BootPerf] load=' + ms + 'ms budget=' + budget + 'ms');
        sessionStorage.setItem('pickup.splash.seen.cached', '1');
        if (ms > budget && !hit) {
          sessionStorage.setItem('pickup.perf.warned', '1');
          var w = document.createElement('div');
          w.textContent = 'PERF: ' + ms + 'ms (budget ' + budget + 'ms)';
          w.style.cssText = 'position:fixed;left:8px;bottom:8px;background:#c84a3a;color:#fff;padding:6px 10px;border-radius:8px;font:11px/1.3 monospace;z-index:99999;';
          document.body.appendChild(w);
          setTimeout(function () { w.remove(); }, 6000);
        }
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
